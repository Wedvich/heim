services:
  postgres:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heim}
      POSTGRES_DB: ${POSTGRES_DB:-heim}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heim"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
